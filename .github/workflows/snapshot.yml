name: Snapshot & Backup

# Daily: regenerate ``public/progress_snapshot.json``, append a row to
# ``data/progress_log.jsonl``, zip ``data/`` as a 90-day-retained
# artifact, and — if the snapshot or log changed — push to main so
# ``deploy.yml`` picks up the refresh without a code change.
#
# Runs at 03:17 UTC (non-round minute keeps it off the hourly queue
# where GitHub Actions gets congested).
on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

concurrency:
  group: snapshot-main
  cancel-in-progress: false

permissions:
  contents: write
  actions: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Regenerate snapshot and JSONL log
        run: |
          set -euo pipefail
          # ``server.progress_snapshot`` is stdlib-only — no spaCy
          # or argostranslate, so no install step needed.
          python -m server.progress_snapshot

      - name: Commit snapshot + log if changed
        run: |
          set -euo pipefail
          git config user.name "bridgn-snapshot-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/progress_snapshot.json data/progress_log.jsonl
          if git diff --cached --quiet; then
            echo "no changes — skipping commit"
            exit 0
          fi
          git commit -m "chore(snapshot): daily progress refresh"
          # Push to main — deploy.yml's ``on: push`` trigger fires
          # next and re-ships the dashboard.
          git push

      - name: Build data/ backup zip
        id: backup
        run: |
          set -euo pipefail
          STAMP=$(date -u +%Y%m%d)
          ZIP="bridgn-data-${STAMP}.zip"
          (cd "$GITHUB_WORKSPACE" && zip -r "/tmp/${ZIP}" data \
            -x 'data/chat2hamnosys/*' \
            -x 'data/authored_signs.sqlite3*' \
            -x 'data/alerts_state.json')
          echo "zip=${ZIP}" >> "$GITHUB_OUTPUT"

      - name: Upload data/ backup artifact
        uses: actions/upload-artifact@v4
        with:
          # Retention intentionally set at 90 days — long enough for
          # "oh no I deleted a meta file last month" recovery, short
          # enough that the storage bill stays bounded. Restore
          # procedure: ``docs/polish/13-restore-runbook.md``.
          name: ${{ steps.backup.outputs.zip }}
          path: /tmp/${{ steps.backup.outputs.zip }}
          retention-days: 90
          if-no-files-found: error
