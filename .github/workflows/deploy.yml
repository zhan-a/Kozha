name: Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:
concurrency:
  group: deploy-main
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (optional)
        uses: actions/checkout@v4
      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}
      - name: Trust host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts
      - name: Deploy to EC2
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # Stream the deploy script into `bash -l -s` on the host. The
          # key is interpolated once here (Actions masks it as *** in
          # logs) and embedded in the transmitted script inside single
          # quotes. Remote-side variables are escaped with `\$` so they
          # evaluate on the host, not on the runner.
          #
          # If the OPENAI_API_KEY secret is empty, we skip the env-file
          # update entirely and leave /etc/kozha.env as it is. The
          # contribute.html BYO-key header (public/contribute.html) still
          # lets contributors supply a personal key per request, so
          # missing a project key is a graceful degradation, not a
          # deploy failure.
          ssh -T -o ServerAliveInterval=30 -o ServerAliveCountMax=3 \
              "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
              bash -l -s <<REMOTE_SCRIPT
          set -euo pipefail
          cd /home/ubuntu/Kozha
          git fetch --prune origin
          git reset --hard origin/main
          git clean -fd -e ./data/
          cd server
          source /home/ubuntu/kozha-venv/bin/activate
          pip install --no-cache-dir -r requirements.txt
          [ -f ../backend/chat2hamnosys/requirements.txt ] || { echo "Missing backend requirements at ../backend/chat2hamnosys/requirements.txt"; exit 1; }
          pip install --no-cache-dir -r ../backend/chat2hamnosys/requirements.txt

          OPENAI_API_KEY_NEW='$OPENAI_API_KEY'
          if [ -n "\$OPENAI_API_KEY_NEW" ]; then
            # Mode 600 means only the owner (root) can read, so the group
            # assignment is cosmetic for systemd's purposes — the service
            # manager reads EnvironmentFile as root before dropping to
            # User=/Group=. Prefer the documented `kozha` group when it
            # exists; fall back to `root` on hosts that provision the
            # service under a different user (e.g. `ubuntu`).
            ENV_GROUP=kozha
            if ! getent group "\$ENV_GROUP" >/dev/null 2>&1; then
              ENV_GROUP=root
            fi
            if [ ! -f /etc/kozha.env ] && [ -f ../deploy/systemd/kozha.env ]; then
              echo "[deploy] /etc/kozha.env missing — bootstrapping from deploy/systemd/kozha.env template (owner root:\$ENV_GROUP). Operator should still populate CHAT2HAMNOSYS_SIGNER_ID_SALT and other host-specific values per docs/chat2hamnosys/19-deployment.md."
              sudo install -o root -g "\$ENV_GROUP" -m 600 ../deploy/systemd/kozha.env /etc/kozha.env
            fi
            if [ -f /etc/kozha.env ]; then
              TMP=\$(sudo mktemp /etc/kozha.env.XXXXXX)
              sudo chmod 600 "\$TMP"
              sudo chown "root:\$ENV_GROUP" "\$TMP"
              sudo sh -c "grep -v '^OPENAI_API_KEY=' /etc/kozha.env > '\$TMP' || true"
              printf 'OPENAI_API_KEY=%s\n' "\$OPENAI_API_KEY_NEW" | sudo tee -a "\$TMP" >/dev/null
              sudo mv "\$TMP" /etc/kozha.env
              echo "[deploy] OPENAI_API_KEY refreshed in /etc/kozha.env."
            else
              echo "[deploy] /etc/kozha.env missing and no template available — skipping OPENAI_API_KEY refresh. Contributors can still use the BYO-key field on contribute.html."
            fi
          else
            echo "[deploy] OPENAI_API_KEY secret not set — leaving /etc/kozha.env as-is. Contributors can still use the BYO-key field on contribute.html."
          fi

          sudo systemctl daemon-reload
          sudo systemctl restart kozha.service
          sudo systemctl --no-pager status kozha.service
          REMOTE_SCRIPT
