name: Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:
concurrency:
  group: deploy-main
  cancel-in-progress: true
jobs:
  # polish-12 §14: critical-only a11y gate — fail the deploy if any
  # page has a critical axe violation. Serious/moderate/minor are
  # tracked in docs/polish/12-a11y-baseline.md and reviewed separately;
  # they don't block a deploy because a legitimate copy change can
  # introduce a moderate regression that the operator wants to ship.
  #
  # TEMP DEV MODE (2026-04-24): gate disabled via ``if: false`` and
  # the ``needs:`` link below is commented out so deploy runs
  # unconditionally. Re-enable both before prod sign-off — search
  # this file for "TEMP DEV MODE" to find every pair.
  a11y-gate:
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dev dependencies
        run: npm ci
      - name: Install Chromium runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2t64
      - name: Run axe deploy-gate (critical only)
        run: npm run a11y:deploy-gate

  deploy:
    # TEMP DEV MODE (2026-04-24): a11y-gate skipped so it can't
    # block. Restore ``needs: a11y-gate`` below before prod sign-off.
    # needs: a11y-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (optional)
        uses: actions/checkout@v4
      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}
      - name: Trust host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts
      - name: Deploy to EC2
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TRANSCRIBE_KEY: ${{ secrets.TRANSCRIBE_KEY }}
        run: |
          # Stream the deploy script into `bash -l -s` on the host. The
          # key is interpolated once here (Actions masks it as *** in
          # logs) and embedded in the transmitted script inside single
          # quotes. Remote-side variables are escaped with `\$` so they
          # evaluate on the host, not on the runner.
          #
          # If the OPENAI_API_KEY secret is empty, we skip the env-file
          # update entirely and leave /etc/kozha.env as it is. The
          # contribute.html BYO-key header (public/contribute.html) still
          # lets contributors supply a personal key per request, so
          # missing a project key is a graceful degradation, not a
          # deploy failure.
          ssh -T -o ServerAliveInterval=30 -o ServerAliveCountMax=3 \
              "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
              bash -l -s <<REMOTE_SCRIPT
          set -euo pipefail
          cd /home/ubuntu/Kozha
          git fetch --prune origin
          git reset --hard origin/main
          git clean -fd -e ./data/
          cd server
          source /home/ubuntu/kozha-venv/bin/activate
          pip install --no-cache-dir -r requirements.txt
          [ -f ../backend/chat2hamnosys/requirements.txt ] || { echo "Missing backend requirements at ../backend/chat2hamnosys/requirements.txt"; exit 1; }
          pip install --no-cache-dir -r ../backend/chat2hamnosys/requirements.txt

          # Prompt 8: refresh public/progress_snapshot.json so the public
          # progress dashboard reflects the freshly-deployed data and
          # meta files. Failures here must not block the deploy — the
          # dashboard can temporarily serve a stale snapshot while the
          # operator investigates, which is strictly better than
          # rolling back a translator deploy over a stats glitch.
          cd ..
          if ! python -m server.progress_snapshot; then
            echo "[deploy] progress_snapshot failed — continuing with existing snapshot"
          fi
          cd server

          OPENAI_API_KEY_NEW='$OPENAI_API_KEY'
          TRANSCRIBE_KEY_NEW='$TRANSCRIBE_KEY'
          if [ -n "\$OPENAI_API_KEY_NEW" ]; then
            # Mode 600 means only the owner (root) can read, so the group
            # assignment is cosmetic for systemd's purposes — the service
            # manager reads EnvironmentFile as root before dropping to
            # User=/Group=. Prefer the documented `kozha` group when it
            # exists; fall back to `root` on hosts that provision the
            # service under a different user (e.g. `ubuntu`).
            ENV_GROUP=kozha
            if ! getent group "\$ENV_GROUP" >/dev/null 2>&1; then
              ENV_GROUP=root
            fi
            if [ ! -f /etc/kozha.env ] && [ -f ../deploy/systemd/kozha.env ]; then
              echo "[deploy] /etc/kozha.env missing — bootstrapping from deploy/systemd/kozha.env template (owner root:\$ENV_GROUP). Operator should still populate CHAT2HAMNOSYS_SIGNER_ID_SALT and other host-specific values per docs/chat2hamnosys/19-deployment.md."
              sudo install -o root -g "\$ENV_GROUP" -m 600 ../deploy/systemd/kozha.env /etc/kozha.env
            fi
            if [ -f /etc/kozha.env ]; then
              TMP=\$(sudo mktemp /etc/kozha.env.XXXXXX)
              sudo chmod 600 "\$TMP"
              sudo chown "root:\$ENV_GROUP" "\$TMP"
              sudo sh -c "grep -v '^OPENAI_API_KEY=' /etc/kozha.env > '\$TMP' || true"
              printf 'OPENAI_API_KEY=%s\n' "\$OPENAI_API_KEY_NEW" | sudo tee -a "\$TMP" >/dev/null
              sudo mv "\$TMP" /etc/kozha.env
              echo "[deploy] OPENAI_API_KEY refreshed in /etc/kozha.env."
            else
              echo "[deploy] /etc/kozha.env missing and no template available — skipping OPENAI_API_KEY refresh. Contributors can still use the BYO-key field on contribute.html."
            fi
          else
            echo "[deploy] OPENAI_API_KEY secret not set — leaving /etc/kozha.env as-is. Contributors can still use the BYO-key field on contribute.html."
          fi

          # TRANSCRIBE_KEY (Gladia) — backs /api/transcribe, the
          # server-side fallback for the in-browser Whisper pipeline.
          # Lives in its OWN file (/etc/kozha-transcribe.env), not in
          # /etc/kozha.env, so the systemd drop-in below can load it
          # without disturbing whatever pre-existing path was already
          # providing OPENAI_API_KEY to the kozha.service process.
          # Same gate-on-non-empty pattern: a missing secret never
          # fails the deploy, the route just returns 503.
          if [ -n "\$TRANSCRIBE_KEY_NEW" ]; then
            TMP=\$(sudo mktemp /etc/kozha-transcribe.env.XXXXXX)
            sudo chmod 600 "\$TMP"
            sudo chown root:root "\$TMP"
            printf 'TRANSCRIBE_KEY=%s\n' "\$TRANSCRIBE_KEY_NEW" | sudo tee "\$TMP" >/dev/null
            sudo mv "\$TMP" /etc/kozha-transcribe.env
            echo "[deploy] /etc/kozha-transcribe.env refreshed."
          else
            echo "[deploy] TRANSCRIBE_KEY secret not set — /api/transcribe will return 503; the in-browser Whisper pipeline still handles transcription."
          fi

          # Heal the nginx site config so the public 80/443 surface
          # comes back up.
          #
          # The previous "sync from repo template" block overwrote the
          # live ``/etc/nginx/sites-available/kozha`` with
          # ``deploy/nginx/kozha.conf`` whenever the two files differed.
          # That template intentionally omits ``ssl_certificate`` /
          # ``ssl_certificate_key`` (the file's own comment says
          # "certbot --nginx populates the ssl_certificate paths …
          # on first run"). Once a deploy overwrote the certbot-edited
          # live file with the bare template, ``nginx -t`` failed with
          # ``no "ssl_certificate" is defined for the "listen ... ssl"
          # directive``. The running nginx process kept serving from
          # its in-memory config until it died for unrelated reasons
          # (OOM / reboot), at which point it could not restart and
          # the site went dark on 80 + 443.
          #
          # Self-healing approach: never blindly overwrite. Instead,
          # if the live file is missing or invalid, write it from the
          # repo template; then unconditionally pin the production
          # ``server_name`` and re-inject the certbot certificate
          # paths if they're missing. Idempotent — once the live file
          # is well-formed, the patcher is a no-op on subsequent runs.
          NGINX_LIVE=/etc/nginx/sites-available/kozha
          NGINX_DOMAIN=kozha-translate.com
          CERT_FULLCHAIN=/etc/letsencrypt/live/\$NGINX_DOMAIN/fullchain.pem
          CERT_KEY=/etc/letsencrypt/live/\$NGINX_DOMAIN/privkey.pem
          if [ -f ../deploy/nginx/kozha.conf ]; then
            # Only seed the live file when it doesn't exist yet —
            # never clobber whatever certbot/operator has already
            # written there. (The previous behaviour was to clobber.)
            if ! sudo test -f "\$NGINX_LIVE"; then
              echo "[deploy] seeding nginx site config from repo template"
              sudo install -o root -g root -m 644 ../deploy/nginx/kozha.conf "\$NGINX_LIVE"
            fi
          fi
          if sudo test -f "\$NGINX_LIVE"; then
            # Pin the production server_name. The repo template ships
            # with the placeholder ``kozha.example``; live deploys use
            # the real domain. ``sed`` is idempotent — when the file
            # already has \$NGINX_DOMAIN this is a no-op.
            sudo sed -i "s/\\bkozha\\.example\\b/\$NGINX_DOMAIN/g" "\$NGINX_LIVE"

            # Inject the certbot certificate paths if the file is
            # listening on 443 with ``ssl`` but has no ``ssl_certificate``
            # directive (the broken state we observed in production).
            if sudo grep -qE '^[[:space:]]*listen[^;]*ssl' "\$NGINX_LIVE" \
              && ! sudo grep -qE '^[[:space:]]*ssl_certificate ' "\$NGINX_LIVE"; then
              if sudo test -f "\$CERT_FULLCHAIN" && sudo test -f "\$CERT_KEY"; then
                # Two consecutive single-line ``sed -i`` calls — both
                # append after the IPv6 listen line, so the file ends
                # up with the directives in reverse insertion order
                # (nginx doesn't care about order between these two).
                # We avoid sed's multi-line ``a\`` form because the
                # required literal newline breaks the YAML scanner.
                sudo sed -i "/listen \\[::\\]:443 ssl http2;/a \\    ssl_certificate_key \$CERT_KEY;" "\$NGINX_LIVE"
                sudo sed -i "/listen \\[::\\]:443 ssl http2;/a \\    ssl_certificate \$CERT_FULLCHAIN;" "\$NGINX_LIVE"
                echo "[deploy] injected ssl_certificate paths for \$NGINX_DOMAIN"
              else
                echo "[deploy] cannot heal nginx config: certbot certs missing at \$CERT_FULLCHAIN" >&2
              fi
            fi

            if sudo nginx -t 2>&1; then
              sudo systemctl reload nginx 2>/dev/null || true
            else
              echo "[deploy] nginx -t still failing after heal" >&2
              sudo nginx -t 2>&1 | sed 's/^/[deploy nginx -t] /' >&2
            fi
          fi

          # Strip CHAT2HAMNOSYS_*_DB / CHAT2HAMNOSYS_DATA_DIR overrides
          # out of /etc/kozha.env. The bootstrap template points them
          # at /var/lib/kozha/... which the gunicorn user (ubuntu on
          # this host) cannot write to, so loading those vars surfaces
          # as "Could not start a session" on the contribute page
          # (PermissionError on session_store / sign_store / token_store
          # in /api/chat2hamnosys/health/ready). Stripping the lines
          # makes chat2hamnosys fall back to its compiled-in defaults
          # (<repo>/data/...), which the host user does own.
          if sudo test -f /etc/kozha.env; then
            if sudo grep -qE '^(CHAT2HAMNOSYS_(SESSION|SIGN|TOKEN)_DB|CHAT2HAMNOSYS_DATA_DIR|CHAT2HAMNOSYS_(EXPORT_AUDIT|REVIEWER_DB)|CHAT2HAMNOSYS_LOG_DIR)=' /etc/kozha.env 2>/dev/null; then
              TMP=\$(sudo mktemp /etc/kozha.env.XXXXXX)
              sudo chmod 600 "\$TMP"
              sudo sh -c "grep -vE '^(CHAT2HAMNOSYS_(SESSION|SIGN|TOKEN)_DB|CHAT2HAMNOSYS_DATA_DIR|CHAT2HAMNOSYS_(EXPORT_AUDIT|REVIEWER_DB)|CHAT2HAMNOSYS_LOG_DIR)=' /etc/kozha.env > '\$TMP' || true"
              sudo mv "\$TMP" /etc/kozha.env
              echo "[deploy] stripped non-writable CHAT2HAMNOSYS_*_DB / DATA_DIR / LOG_DIR overrides from /etc/kozha.env"
            fi
          fi
          # Make sure the chat2hamnosys subdir exists under <repo>/data
          # so the SQLite connect doesn't fail on a missing parent dir.
          mkdir -p /home/ubuntu/Kozha/data/chat2hamnosys || true

          # systemd drop-in that loads BOTH env files into kozha.service:
          #   * /etc/kozha.env           — OPENAI_API_KEY (existing
          #     contract: refreshed by the deploy block above each run).
          #   * /etc/kozha-transcribe.env — TRANSCRIBE_KEY only.
          # The host's existing kozha.service unit has no EnvironmentFile=
          # of its own (verified via systemctl cat) so the drop-in is the
          # only path injecting either secret. Order matters: the
          # transcribe file is loaded SECOND so its TRANSCRIBE_KEY
          # cannot be silently overridden by a stale entry in
          # /etc/kozha.env. The leading dash on each path makes the
          # file optional — a missing secret never fails the deploy.
          DROPIN_DIR=/etc/systemd/system/kozha.service.d
          DROPIN_FILE=\$DROPIN_DIR/10-kozha-env.conf
          DROPIN_BODY='[Service]
          EnvironmentFile=-/etc/kozha.env
          EnvironmentFile=-/etc/kozha-transcribe.env'
          NEED_INSTALL=1
          if sudo test -f "\$DROPIN_FILE"; then
            if echo "\$DROPIN_BODY" | sudo cmp -s - "\$DROPIN_FILE"; then
              NEED_INSTALL=0
            fi
          fi
          if [ "\$NEED_INSTALL" = "1" ]; then
            sudo mkdir -p "\$DROPIN_DIR"
            echo "\$DROPIN_BODY" | sudo tee "\$DROPIN_FILE" >/dev/null
            sudo chmod 644 "\$DROPIN_FILE"
            echo "[deploy] installed systemd drop-in: \$DROPIN_FILE"
          fi
          # Remove the prior single-purpose drop-in if present.
          if sudo test -f "\$DROPIN_DIR/10-transcribe-key.conf"; then
            sudo rm -f "\$DROPIN_DIR/10-transcribe-key.conf"
            echo "[deploy] removed superseded drop-in 10-transcribe-key.conf"
          fi
          # Strip any stale TRANSCRIBE_KEY= line out of /etc/kozha.env
          # so the dedicated file is the only source for that var.
          if sudo test -f /etc/kozha.env && sudo grep -q '^TRANSCRIBE_KEY=' /etc/kozha.env 2>/dev/null; then
            TMP=\$(sudo mktemp /etc/kozha.env.XXXXXX)
            sudo chmod 600 "\$TMP"
            sudo sh -c "grep -v '^TRANSCRIBE_KEY=' /etc/kozha.env > '\$TMP' || true"
            sudo mv "\$TMP" /etc/kozha.env
            echo "[deploy] cleaned legacy TRANSCRIBE_KEY line out of /etc/kozha.env"
          fi

          sudo systemctl daemon-reload
          sudo systemctl restart kozha.service
          sudo systemctl --no-pager status kozha.service

          # Ensure nginx is running. The reload-on-config-diff path
          # earlier only fires when ../deploy/nginx/kozha.conf changed;
          # it does NOT recover a dead nginx daemon (host OOM, an
          # out-of-band edit, or a previous run that left it stopped).
          # Without this, a deploy can finish "successfully" — kozha
          # is active on 8000 — while the public site still returns
          # connection-refused on 80/443. Pin a liveness check so the
          # deploy step itself heals that case. Idempotent: when
          # nginx is already active this is a no-op.
          if ! sudo systemctl is-active --quiet nginx; then
            echo "[deploy] nginx is not active — running config check + start"
            sudo nginx -t
            sudo systemctl start nginx
            if sudo systemctl is-active --quiet nginx; then
              echo "[deploy] nginx started"
            else
              echo "[deploy] nginx failed to start" >&2
              sudo journalctl -u nginx --no-pager -n 30
              exit 1
            fi
          fi

          # Polish-13 §6: deploy receipt for ``server/alerts.py``. The
          # host-side alerter reads ``data/last_deploy.json`` to tell
          # whether the most recent deploy attempt succeeded. Written
          # only when the systemctl restart returned cleanly (the heredoc
          # set -e aborts before here on any earlier failure).
          cd /home/ubuntu/Kozha
          DEPLOY_SHA=\$(git rev-parse HEAD)
          DEPLOY_AT=\$(date -u +%Y-%m-%dT%H:%M:%SZ)
          cat > data/last_deploy.json <<JSON
          {"status": "success", "sha": "\$DEPLOY_SHA", "at": "\$DEPLOY_AT"}
          JSON
          REMOTE_SCRIPT
