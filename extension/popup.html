<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=420" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="popup-header">
    <span id="popup-title">Kozha</span>
  </div>

  <div id="popup-body">
    <p id="popup-intro">Look up a word or phrase to see how it signs.</p>
    <a id="popup-yt-link" href="https://www.youtube.com" target="_blank" rel="noopener">Open YouTube — captions sign automatically</a>
    <textarea id="popup-input" rows="3" placeholder="Type or paste text to sign..."></textarea>
    <div id="popup-history"></div>

    <div id="popup-selects">
      <div class="select-group">
        <label for="popup-input-lang">Input</label>
        <select id="popup-input-lang">
          <option value="en" selected>English</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="es">Spanish</option>
          <option value="pt">Portuguese</option>
          <option value="it">Italian</option>
          <option value="nl">Dutch</option>
          <option value="pl">Polish</option>
          <option value="ru">Russian</option>
          <option value="zh">Chinese</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="ar">Arabic</option>
          <option value="hi">Hindi</option>
          <option value="tr">Turkish</option>
          <option value="vi">Vietnamese</option>
        </select>
      </div>
      <div class="select-group">
        <label for="popup-sign-lang">Sign</label>
        <select id="popup-sign-lang">
          <option value="bsl" selected>BSL</option>
          <option value="asl">ASL</option>
          <option value="dgs">DGS (German)</option>
          <option value="lsf">LSF (French)</option>
          <option value="pjm">PJM (Polish)</option>
          <option value="gsl">GSL (Greek)</option>
          <option value="ngt">NGT (Dutch)</option>
          <option value="algerian">Algerian SL</option>
          <option value="bangla">Bangla SL</option>
          <option value="fsl">Filipino SL</option>
          <option value="isl">Indian SL</option>
          <option value="kurdish">Kurdish SL</option>
          <option value="vsl">Vietnamese SL</option>
        </select>
      </div>
    </div>

    <button id="popup-sign-btn">Sign</button>

    <div id="popup-avatar-wrap">
      <iframe id="popup-avatar-frame" src="panel.html"></iframe>
    </div>

    <div id="popup-playback">
      <div id="popup-playback-buttons">
        <button type="button" class="popup-play-btn" id="popup-pause-btn"
                aria-label="Pause" aria-pressed="false" title="Pause / resume (space)">⏸</button>
        <button type="button" class="popup-play-btn" id="popup-stop-btn"
                aria-label="Stop" title="Stop">⏹</button>
      </div>
      <div id="popup-speed" role="group" aria-label="Playback speed">
        <button type="button" class="popup-speed-btn" data-speed="0.5">0.5×</button>
        <button type="button" class="popup-speed-btn is-active" data-speed="1">1×</button>
        <button type="button" class="popup-speed-btn" data-speed="2">2×</button>
      </div>
    </div>

    <div id="popup-gloss-display"></div>
    <div id="popup-status">Ready</div>
  </div>

  <footer id="popup-footer">
    <a href="https://kozha-translate.com/contribute.html" target="_blank" rel="noopener">Contribute a sign on kozha-translate.com</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
