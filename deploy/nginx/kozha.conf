# /etc/nginx/sites-available/kozha
#
# Reverse proxy in front of the Kozha + chat2hamnosys backend on
# 127.0.0.1:8000. Pairs with deploy/systemd/kozha.service.
#
# TLS:
#   sudo apt-get install -y nginx certbot python3-certbot-nginx
#   sudo ln -s /etc/nginx/sites-available/kozha /etc/nginx/sites-enabled/kozha
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d kozha.example
#
# certbot rewrites this file to add the `listen 443 ssl http2` block
# and the certificate paths. Re-apply manual edits after certbot runs.

# HTTP → HTTPS redirect. The acme-challenge location stays open so
# certbot can renew.
server {
    listen 80;
    listen [::]:80;
    server_name kozha.example;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server. certbot --nginx populates the ssl_certificate paths and
# adds the `listen 443 ssl http2;` directives on first run.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kozha.example;

    # Hardened defaults — Mozilla "intermediate" profile, OCSP stapling.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

    client_max_body_size 4m;        # caps prose / correction payloads
    keepalive_timeout 75s;

    # Long-poll endpoints (SSE event stream) need extended timeouts.
    location ~ ^/api/chat2hamnosys/sessions/[^/]+/events$ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;            # SSE: stream tokens immediately
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # LLM-bound endpoints. /describe, /answer, /correct, /generate
    # synchronously call gpt-5.4 via the Responses API; reasoning
    # models can think for several minutes on a complex SiGML emit.
    # The default 60s ceiling killed corrections at exactly 60s and
    # surfaced as nginx 504s — the contributor saw "AI had trouble"
    # while the server was still running. 10 minutes matches the
    # client-side and OpenAI-side timeouts now in effect.
    location ~ ^/api/chat2hamnosys/sessions/[^/]+/(describe|answer|correct|generate)$ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Default proxy. Keep a generous 120s — even non-LLM endpoints
    # occasionally do heavy work (snapshot generation, DTD validation
    # of a large SiGML, etc.). Longer than 120s should hit one of the
    # explicit LLM locations above.
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # /metrics is unauthenticated and intended for an internal Prometheus
    # scrape only. Lock it to the loopback / private CIDR your monitoring
    # host runs on; everyone else gets 403.
    location = /api/chat2hamnosys/metrics {
        allow 127.0.0.1;
        allow ::1;
        # allow 10.0.0.0/8;        # uncomment for an internal subnet
        deny all;
        proxy_pass http://127.0.0.1:8000;
    }
}
