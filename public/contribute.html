<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contribute a sign — Bridgn</title>
  <meta name="description" content="Contribute a single sign to the Bridgn dictionary. Pick a sign language, describe the sign, review the notation, submit for Deaf review.">
  <link rel="canonical" href="https://kozha-translate.com/contribute.html">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="stylesheet" href="/contribute.css">
</head>
<body>

  <header class="site-header">
    <a href="/" class="site-name">Bridgn</a>
    <a href="/app.html" class="back-link">Open translator</a>
  </header>

  <main>
    <h1>Contribute a sign</h1>

    <section class="language-picker" id="languagePicker" aria-label="Sign language selection">
      <div class="picker-empty" id="pickerEmpty">
        <p class="picker-prompt">Which sign language are you contributing to?</p>
        <ul class="picker-options" id="pickerOptions" role="listbox" aria-label="Available sign languages"></ul>
      </div>

      <div class="picker-active" id="pickerActive" hidden>
        <span class="picker-label">Signing in</span>
        <span class="language-badge" id="languageBadge" aria-live="polite"></span>
        <button type="button" class="change-btn" id="changeLanguageBtn" aria-label="Change sign language">change</button>
      </div>
    </section>

    <div class="reviewer-notice" id="reviewerNotice" role="status" hidden></div>

    <!-- authoring-root: filled by prompts 4 (chat), 5 (preview), 6 (notation
         readout), and 7 (submit region). Deliberately empty in this prompt. -->
    <section id="authoring-root" aria-label="Sign authoring workspace" hidden></section>
  </main>

  <footer class="site-footer">
    <ul class="footer-links">
      <li><a href="/governance.html">Governance</a></li>
      <li><a href="/privacy.html">Privacy</a></li>
      <li><a href="/contact.html">Contact</a></li>
    </ul>
  </footer>

  <script src="/contribute.js"></script>
</body>
</html>
