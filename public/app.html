<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bridgn — Translator</title>
  <meta name="description" content="Translate text or speech into sign language animations with Bridgn. Supports German, Polish, and British sign languages.">
  <meta property="og:title" content="Bridgn — Sign Language Translator">
  <meta property="og:description" content="Type or speak to see sign language animations in real time. Free and open-source.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://kozha-translate.com/app.html">
  <meta name="twitter:card" content="summary">
  <link rel="canonical" href="https://kozha-translate.com/app.html">
  <link rel="icon" href="/favicon.ico" sizes="any">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://vhg.cmp.uea.ac.uk/tech/jas/vhg2024/cwa/cwasa.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script defer src="https://vhg.cmp.uea.ac.uk/tech/jas/vhg2024/cwa/allcsa.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <link rel="preload" href="/data/hamnosys_bsl_version1.sigml" as="fetch" crossorigin>
  <link rel="preload" href="https://vhg.cmp.uea.ac.uk/tech/jas/vhg2024/cwa/cwasa.css" as="style" crossorigin="anonymous">

  <style>
    :root {
      --ink: #1a1612;
      --ink-2: #3d3630;
      --ink-3: #685d54;
      --paper: #f5f1eb;
      --paper-2: #ede8e0;
      --paper-3: #e4ddd3;
      --accent: #c96a2e;
      --accent-2: #e8843e;
      --accent-light: #f5e4d6;
      --green: #2d6a4f;
      --green-light: #d4edda;
      --border: rgba(26,22,18,0.12);
      --radius: 16px;
      --radius-sm: 10px;
      --sidebar: 260px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .app-nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px;
      height: 56px;
      background: rgba(245,241,235,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: 'Instrument Serif', serif;
      font-size: 20px;
      color: var(--ink);
      text-decoration: none;
    }
    .nav-logo span { color: var(--accent); }

    .nav-badge {
      background: var(--accent-light);
      color: var(--accent);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 3px 10px;
      border-radius: 999px;
      text-transform: uppercase;
    }

    .nav-right {
      display: flex; align-items: center; gap: 12px;
    }

    .nav-link-sm {
      font-size: 13px;
      color: var(--ink-3);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .nav-link-sm:hover { color: var(--accent); }

    .app-shell {
      flex: 1;
      display: flex;
      max-width: 1280px;
      width: 100%;
      margin: 0 auto;
      padding: 24px 32px;
      gap: 24px;
    }

    .sidebar {
      width: var(--sidebar);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sidebar-section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-3);
      padding: 4px 8px;
      margin-top: 8px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.15s;
      font-size: 14px;
      font-weight: 500;
      color: var(--ink-2);
      border: 1px solid transparent;
      background: none;
      width: 100%;
      text-align: left;
    }
    .sidebar-item:hover {
      background: white;
      border-color: var(--border);
    }
    .sidebar-item.active {
      background: white;
      border-color: rgba(201,106,46,0.2);
      color: var(--accent);
    }

    .sidebar-icon {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: var(--paper-2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .sidebar-item.active .sidebar-icon {
      background: var(--accent-light);
    }

    .sidebar-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 8px 0;
    }

    .content-area {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .render-panel {
      width: 420px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
    }

    .card-title {
      font-family: 'Instrument Serif', serif;
      font-size: 17px;
      color: var(--ink);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title-icon {
      font-size: 16px;
    }

    label.field-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-3);
      margin-bottom: 6px;
    }

    textarea, input[type="text"], select {
      width: 100%;
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    textarea:focus, input[type="text"]:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(201,106,46,0.1);
    }
    textarea { min-height: 80px; resize: vertical; }
    select { cursor: pointer; }

    input[type="file"] {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--ink-3);
    }

    .btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 9px 18px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .btn:disabled { opacity: 0.45; cursor: default; }

    .btn-primary {
      background: var(--accent);
      color: white;
    }
    .btn-primary:not(:disabled):hover {
      background: var(--accent-2);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(201,106,46,0.3);
    }

    .btn-secondary {
      background: white;
      color: var(--ink-2);
      border: 1px solid var(--border);
    }
    .btn-secondary:not(:disabled):hover {
      background: var(--paper-2);
    }

    .btn-danger {
      background: white;
      color: #c0392b;
      border: 1px solid rgba(192,57,43,0.2);
    }
    .btn-danger:hover { background: #fdf0ee; }

    .btn-translate {
      width: 100%;
      padding: 13px 20px;
      font-size: 15px;
      border-radius: var(--radius);
      background: var(--accent);
      color: white;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-translate:not(:disabled):hover {
      background: var(--accent-2);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(201,106,46,0.3);
    }
    .btn-translate:disabled { opacity: 0.5; cursor: default; }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .grow { flex: 1 1 auto; min-width: 0; }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--paper-2);
      color: var(--ink-3);
    }
    .status-badge.ready {
      background: var(--green-light);
      color: var(--green);
    }
    .status-badge.loading {
      background: var(--accent-light);
      color: var(--accent);
    }
    .status-badge::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .log-area {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-family: ui-monospace, 'Menlo', monospace;
      font-size: 12px;
      line-height: 1.6;
      color: var(--ink-3);
      min-height: 48px;
      max-height: 180px;
      overflow-y: auto;
      white-space: pre-wrap;
    }

    .avatar-wrapper {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .avatar-stage {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .CWASAAvatar.av0 { width: 384px; height: 320px; }
    .divCtrlPanel { display: none; }
    .menuAv { display: none; }

    .avatar-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    .avatar-switcher {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .avatar-switcher label {
      font-size: 13px;
      color: var(--ink-3);
      font-weight: 500;
    }
    .avatar-switcher select {
      font-size: 13px;
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: white;
      color: var(--ink);
      cursor: pointer;
    }

    .input-tabs {
      display: flex;
      gap: 4px;
      background: var(--paper-2);
      padding: 4px;
      border-radius: var(--radius-sm);
      margin-bottom: 16px;
    }
    .input-tab {
      flex: 1;
      padding: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-3);
      background: none;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .input-tab.active {
      background: white;
      color: var(--accent);
      box-shadow: 0 1px 4px rgba(26,22,18,0.08);
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .chip {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 500;
      color: var(--ink-2);
    }

    .hint {
      font-size: 12px;
      color: var(--ink-3);
      line-height: 1.5;
      margin-top: 6px;
    }

    .content-panel { display: none; }
    .content-panel.active { display: flex; flex-direction: column; gap: 16px; }

    .advanced-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .check-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-2);
      cursor: pointer;
    }
    .check-label input[type="checkbox"] {
      width: auto;
      accent-color: var(--accent);
    }

    .char-count {
      text-align: right;
      font-size: 12px;
      color: var(--ink-3);
      margin-top: 4px;
    }
    .char-count.over { color: #c0392b; font-weight: 600; }

    .token-list {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      min-height: 28px;
    }
    .token-chip {
      background: var(--paper-2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 500;
      color: var(--ink-2);
      transition: all 0.2s;
    }
    .token-chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    .token-chip.done {
      background: var(--green-light);
      border-color: var(--green);
      color: var(--green);
    }

    .playback-progress {
      width: 100%;
      height: 4px;
      background: var(--paper-2);
      border-radius: 2px;
      overflow: hidden;
    }
    .playback-progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s;
    }

    .hamburger {
      display: none;
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      font-size: 18px;
      cursor: pointer;
      color: var(--ink-2);
      line-height: 1;
    }

    @media (min-width: 1100px) {
      .app-shell {
        flex-direction: row;
      }
    }

    @media (max-width: 1099px) {
      .app-shell { flex-direction: column; padding: 16px; }
      .sidebar {
        width: 100%;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 4px;
        overflow: hidden;
        max-height: 0;
        transition: max-height 0.3s ease;
      }
      .sidebar.open { max-height: 500px; }
      .sidebar-section-label { display: none; }
      .sidebar-divider { display: none; }
      .render-panel { width: 100%; }
      .CWASAAvatar.av0 { width: 100%; height: auto; }
      .advanced-grid { grid-template-columns: 1fr; }
      .hamburger { display: block; }
      .btn, .btn-secondary, .btn-primary, .btn-translate, .sidebar-item {
        min-height: 44px;
      }
      .avatar-controls { flex-wrap: wrap; gap: 8px; }
      .nav-right { gap: 8px; }
      .nav-link-sm { font-size: 12px; }
      .app-nav { padding: 0 16px; }
    }

    @media (max-width: 600px) {
      .render-panel .avatar-stage { overflow: hidden; }
      .row { flex-direction: column; align-items: stretch; }
      .row .grow { width: 100%; }
    }
    .skip-link {
      position: absolute;
      top: -100%;
      left: 16px;
      background: var(--accent);
      color: white;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      z-index: 200;
      text-decoration: none;
    }
    .skip-link:focus {
      top: 8px;
    }
  </style>
</head>
<body>

  <a href="#main-content" class="skip-link">Skip to main content</a>

  <nav class="app-nav" aria-label="Main navigation">
    <div style="display:flex; align-items:center; gap:12px;">
      <a href="index.html" class="nav-logo">Bridg<span>n</span></a>
      <span class="nav-badge">Translator</span>
    </div>
    <div class="nav-right">
      <a href="contribute.html" class="nav-link-sm">Contribute</a>
      <a href="index.html" class="nav-link-sm">← Home</a>
      <button class="hamburger" id="hamburgerBtn" aria-label="Menu">☰</button>
    </div>
  </nav>

  <div class="app-shell">

    <aside class="sidebar" aria-label="Sidebar navigation">
      <div class="sidebar-section-label">Input</div>

      <button class="sidebar-item active" data-panel="translate" onclick="switchPanel('translate', this)">
        <div class="sidebar-icon">🤟</div>
        Translate
      </button>

      <button class="sidebar-item" data-panel="microphone" onclick="switchPanel('microphone', this)">
        <div class="sidebar-icon">🎙️</div>
        Microphone
      </button>

      <button class="sidebar-item" data-panel="video" onclick="switchPanel('video', this)">
        <div class="sidebar-icon">🎬</div>
        Video Upload
      </button>

      <hr class="sidebar-divider" />
      <div class="sidebar-section-label">Configuration</div>

      <button class="sidebar-item" data-panel="database" onclick="switchPanel('database', this)">
        <div class="sidebar-icon">🗄️</div>
        Database
      </button>

      <button class="sidebar-item" data-panel="advanced" onclick="switchPanel('advanced', this)">
        <div class="sidebar-icon">⚙️</div>
        Advanced
      </button>

      <hr class="sidebar-divider" />
      <div class="sidebar-section-label">Debug</div>

      <button class="sidebar-item" data-panel="planner" onclick="switchPanel('planner', this)">
        <div class="sidebar-icon">📋</div>
        Planner Log
      </button>
    </aside>

    <div class="content-area" id="main-content" role="main">

      <div class="content-panel active" id="panel-translate">
        <div class="card">
          <div class="card-title"><span class="card-title-icon">✏️</span> Text Input</div>
          <label class="field-label">Enter your phrase</label>
          <textarea id="textIn" placeholder="Try something like: Hello, how are you?" rows="3" maxlength="500"></textarea>
          <div class="char-count" id="charCount">0 / 500</div>

          <div class="row" style="margin-top: 12px; gap: 12px;">
            <div class="grow">
              <label class="field-label" style="margin-bottom:6px;">Input language</label>
              <select id="langHint" aria-label="Input language">
                <optgroup label="Common">
                  <option value="en" selected>English</option>
                  <option value="es">Spanish</option>
                  <option value="fr">French</option>
                  <option value="de">German</option>
                  <option value="zh">Chinese</option>
                  <option value="ar">Arabic</option>
                  <option value="ru">Russian</option>
                  <option value="pt">Portuguese</option>
                  <option value="ja">Japanese</option>
                  <option value="hi">Hindi</option>
                  <option value="ko">Korean</option>
                  <option value="it">Italian</option>
                  <option value="tr">Turkish</option>
                </optgroup>
                <optgroup label="More languages">
                  <option value="af">Afrikaans</option>
                  <option value="bn">Bengali</option>
                  <option value="bg">Bulgarian</option>
                  <option value="ca">Catalan</option>
                  <option value="hr">Croatian</option>
                  <option value="cs">Czech</option>
                  <option value="da">Danish</option>
                  <option value="nl">Dutch</option>
                  <option value="et">Estonian</option>
                  <option value="fi">Finnish</option>
                  <option value="el">Greek</option>
                  <option value="he">Hebrew</option>
                  <option value="hu">Hungarian</option>
                  <option value="id">Indonesian</option>
                  <option value="lv">Latvian</option>
                  <option value="lt">Lithuanian</option>
                  <option value="ms">Malay</option>
                  <option value="no">Norwegian</option>
                  <option value="fa">Persian</option>
                  <option value="pl">Polish</option>
                  <option value="ro">Romanian</option>
                  <option value="sr">Serbian</option>
                  <option value="sk">Slovak</option>
                  <option value="sl">Slovenian</option>
                  <option value="sv">Swedish</option>
                  <option value="th">Thai</option>
                  <option value="uk">Ukrainian</option>
                  <option value="ur">Urdu</option>
                  <option value="vi">Vietnamese</option>
                </optgroup>
              </select>
            </div>
            <div class="grow">
              <label class="field-label" style="margin-bottom:6px;">Sign language</label>
              <select id="signLangSelect" aria-label="Sign language">
                <option value="bsl" selected>BSL (British)</option>
                <option value="asl">ASL (American)</option>
                <option value="dgs">DGS (German)</option>
                <option value="lsf">LSF (French)</option>
                <option value="lse">LSE (Spanish)</option>
                <option value="pjm">PJM (Polish)</option>
                <option value="gsl">GSL (Greek)</option>
                <option value="rsl">RSL (Russian)</option>
                <option value="algerian">Algerian SL</option>
                <option value="bangla">Bangla SL</option>
                <option value="ngt">NGT (Dutch)</option>
                <option value="fsl">FSL (Filipino)</option>
                <option value="isl">ISL (Indian)</option>
                <option value="kurdish">Kurdish SL</option>
                <option value="vsl">VSL (Vietnamese)</option>
              </select>
            </div>
          </div>

          <button id="translateBtn" class="btn-translate" style="margin-top: 16px;" aria-label="Translate to sign language">
            🤟 Translate to Sign
          </button>
        </div>
      </div>

      <div class="content-panel" id="panel-microphone">
        <div class="card">
          <div class="card-title"><span class="card-title-icon">🎙️</span> Microphone Input</div>
          <div class="row" style="margin-bottom:12px;">
            <button id="recordBtn" class="btn btn-secondary">● Start recording</button>
            <button id="transcribeBtn" class="btn btn-primary">Transcribe</button>
            <span id="micStatus" class="status-badge" role="status" aria-live="polite">Idle</span>
          </div>
          <label class="field-label">Transcription</label>
          <textarea id="transcription" placeholder="Transcription will appear here…"></textarea>
        </div>
      </div>

      <div class="content-panel" id="panel-video">
        <div class="card">
          <div class="card-title"><span class="card-title-icon">🎬</span> Video Upload → Sign</div>
          <label class="field-label">Select video file</label>
          <input type="file" id="videoFile" accept="video/*" style="margin-bottom:12px;" />
          <div class="row">
            <button id="videoToSignBtn" class="btn btn-primary">Process Video → Sign</button>
            <span id="videoStatus" class="status-badge" role="status" aria-live="polite">No file selected</span>
          </div>
        </div>
      </div>

      <div class="content-panel" id="panel-database">
        <div class="card">
          <div class="card-title"><span class="card-title-icon">🗄️</span> Sign Database</div>

  <script>
  const renderStatus = document.getElementById('renderStatus');

  function initCWASA() {
    if (!window.CWASA) {
      renderStatus.textContent = 'Avatar not available.';
      renderStatus.className = 'status-badge';
      return;
    }
    CWASA.init({
      useClientConfig: false,
      useCwaConfig: true,
      avSettings: [{
        width: 384,
        height: 320,
        avList: 'avs',
        initAv: 'luna',
        ambIdle: true,
        allowFrameSteps: false,
        allowSiGMLText: false,
      }]
    });

    if (CWASA.ready && typeof CWASA.ready.then === 'function') {
      CWASA.ready.then(() => {
        syncAvatarMenu();
      });
    }

    CWASA.addHook('avatarready', function() {
      _avatarReady = true;
      checkAllReady();
    }, 0);
  }

  function syncAvatarMenu() {
    const cwaMenu = document.querySelector('.menuAv.av0');
    const ourSelect = document.getElementById('avatarSelect');
    if (cwaMenu) {
      ourSelect.innerHTML = '';
      for (const opt of cwaMenu.options) {

        o.value = opt.value;
        o.textContent = opt.textContent.trim();

        ourSelect.appendChild(o);

  document.getElementById('avatarSelect').addEventListener('change', function() {
    const cwaMenu = document.querySelector('.menuAv.av0');

      cwaMenu.value = this.value;
      cwaMenu.dispatchEvent(new Event('change'));

      renderStatus.className = 'status-badge loading';

  window.addEventListener('load', () => {
    setTimeout(() => {
      try { initCWASA(); } catch (e) {
        console.error(e);
        renderStatus.textContent = 'Avatar failed to load.';
      }
    }, 150);

  </script>

  <script>
    function switchPanel(name, btn) {

  <script>
    const abbrevUrl = document.getElementById('abbrevUrl');
    const loadAbbrevUrlBtn = document.getElementById('loadAbbrevUrlBtn');
    const abbrevFile = document.getElementById('abbrevFile');
    const clearAbbrevBtn = document.getElementById('clearAbbrevBtn');
    const applyAbbrev = document.getElementById('applyAbbrev');
    const eduNlpToggle = document.getElementById('eduNlpToggle');
    const stemMode = document.getElementById('stemMode');
    const timeframeOut = document.getElementById('timeframeOut');
    const abbrevCountOut = document.getElementById('abbrevCountOut');

    let ABBREV = new Map();

    const STEM_PRESET = {
      'carbon dioxide': 'co2', 'deoxyribonucleic acid': 'dna',
      'adenosine triphosphate': 'atp', 'machine learning': 'ml',
      'artificial intelligence': 'ai', 'central processing unit': 'cpu',
      'graphics processing unit': 'gpu',
    };

    function applyStemPreset(){ for (const [k,v] of Object.entries(STEM_PRESET)) ABBREV.set(k.toLowerCase(), v.toLowerCase()); }
    function clearAbbrev(){ ABBREV.clear(); updateAbbrevCount(0); log('Cleared abbreviations.'); }
    function updateAbbrevCount(n){ if(abbrevCountOut) abbrevCountOut.value = String(n); }

    async function loadAbbrevFromUrl(url){
      try{
        const res = await fetch(url);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const obj = await res.json();
        let n = 0;
        for (const [k,v] of Object.entries(obj||{})){ ABBREV.set(String(k).toLowerCase().trim(), String(v).toLowerCase().trim()); n++; }
        updateAbbrevCount(ABBREV.size); log(`Loaded ${n} abbreviations from ${url}`);
      }catch(e){ log('Abbrev load error: ' + e); }
    }

    async function loadAbbrevFromFile(file){
      try{
        const txt = await file.text();
        const obj = JSON.parse(txt);
        let n = 0;
        for (const [k,v] of Object.entries(obj||{})){ ABBREV.set(String(k).toLowerCase().trim(), String(v).toLowerCase().trim()); n++; }
        updateAbbrevCount(ABBREV.size); log(`Loaded ${n} abbreviations from file: ${file.name}`);
      }catch(e){ log('Abbrev file error: ' + e); }
    }

    function replaceAbbreviationsBrowser(text){
      if (!applyAbbrev.checked || ABBREV.size === 0) return { text, count: 0 };
      const pairs = Array.from(ABBREV.entries()).sort((a,b)=> b[0].length - a[0].length);
      let count = 0; let out = text;
      for (const [phrase, replRaw] of pairs){
        const escaped = phrase.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const re = new RegExp('(^|[^A-Za-z0-9_])(' + escaped + ')(?=[^A-Za-z0-9_]|$)', 'gi');
        out = out.replace(re, (match, pre, matched) => {
          count++;
          const raw = String(replRaw);
          const repl = (/^[a-z]{2,5}$/i.test(raw) && /^[a-z]{2,5}$/.test(raw)) ? raw.toUpperCase() : raw;
          return pre + repl;
        });
      }
      return { text: out, count };
    }

    const EDU_STOPWORDS = new Set(['a','an','the','and','or','but','if','then','than','of','to','in','on','at','for','from','with','as','by','is','are','am','be','been','was','were','do','does','did','that','this','those','these','it','my','your','our']);

    function timeframeGuess(str){
      const s = (str || '').toLowerCase();
      if (/\bwill\b|\btomorrow\b|\bnext\b/.test(s)) return 'Future';
      if (/\byesterday\b|\bago\b|\blast\b/.test(s)) return 'Past';
      return 'Present';
    }

    async function ensureCompromise(){
      if (typeof window.nlp === 'undefined') {
        await new Promise(function(resolve, reject) {
          var s = document.createElement('script');
          s.src = 'https://unpkg.com/compromise@14.12.0/builds/compromise.min.js';
          s.onload = resolve;
          s.onerror = reject;
          document.head.appendChild(s);
        });
      }
    }

    async function processEducationalText(text){
      await ensureCompromise();
      const doc = window.nlp(text);
      const tokens = [];
      const pronouns = doc.match('#Pronoun').out('array').map(s=>s.toLowerCase());
      for (const p of pronouns){ if (!EDU_STOPWORDS.has(p)) tokens.push(p); }
      const verbInf = doc.verbs().toInfinitive().out('array').map(s=>s.toLowerCase());
      for (const v of verbInf){ if (!EDU_STOPWORDS.has(v)) tokens.push(v); }
      const nouns = doc.nouns().toSingular().out('array').map(s=>s.toLowerCase());
      for (const n of nouns){ if (!EDU_STOPWORDS.has(n)) tokens.push(n); }
      const seen = new Set();
      return tokens.filter(t=>{ if (seen.has(t)) return false; seen.add(t); return true; });
    }

    loadAbbrevUrlBtn.addEventListener('click', ()=>{ const u = abbrevUrl.value.trim(); if (u) loadAbbrevFromUrl(u); });
    if (abbrevFile) abbrevFile.addEventListener('change', (e) => { const f = e.target?.files?.[0]; if (f) loadAbbrevFromFile(f); });
    clearAbbrevBtn.addEventListener('click', ()=> clearAbbrev());
    stemMode.addEventListener('change', ()=>{ if (stemMode.checked){ applyStemPreset(); updateAbbrevCount(ABBREV.size); log('STEM preset loaded.'); } });
  </script>

  <script>
    const allowedOut = document.getElementById('allowedOut');
    const dbUrlInput = document.getElementById('dbUrlInput');
    const loadDbBtn = document.getElementById('loadDbBtn');
    const conceptUrlInput = document.getElementById('conceptUrlInput');
    const loadConceptBtn  = document.getElementById('loadConceptBtn');
    const conceptFile     = document.getElementById('conceptFile');

    const glossToSign = new Map();
    const letterToSign = new Map();
    const baseToGloss = new Map();
    const conceptToGloss = new Map();

    function glossBase(gloss) {
      return String(gloss).toLowerCase().replace(/\(.*?\)/g,'').replace(/#\d+$/g,'').replace(/\d+[a-z]?\^?$/g,'').replace(/^_num-/g,'').replace(/_\(.*?\)/g,'').replace(/[^a-z0-9\u00C0-\u024F\u0370-\u03FF\u0400-\u04FF\u0100-\u017F]+/g,' ').trim();
    }

    function rebuildBaseIndex() {
      baseToGloss.clear();
      for (const g of glossToSign.keys()){ const b = glossBase(g); if (!baseToGloss.has(b)) baseToGloss.set(b, g); }
    }

    async function loadSigmlUrl(url, isAutoload = false){
      try{
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 15000);
        const res = await fetch(url, { signal: controller.signal });
        clearTimeout(timeout);
        if (!res.ok){ if (isAutoload && res.status === 404){ log(`Optional DB missing: ${url}`); return; } throw new Error('HTTP ' + res.status); }
        const xmlText = await res.text();
        const doc = new DOMParser().parseFromString(xmlText, 'application/xml');
        const signs = Array.from(doc.querySelectorAll('hns_sign'));
        let added = 0;
        for (const s of signs){ const gloss = (s.getAttribute('gloss')||'').trim().toLowerCase(); if (!gloss) continue; glossToSign.set(gloss, s.outerHTML); added++; }
        refreshAllowedOutput(); log(`Loaded ${added} signs from ${url}`);
        if (renderStatus.className.includes('loading')) {
          renderStatus.textContent = 'Loading database (' + glossToSign.size + ' signs)…';
        }
      }catch(e){ if (isAutoload){ log(`Optional DB missing: ${url}`); } else { log(`Failed to load ${url}: ${e}.`); } }
    }

    function refreshAllowedOutput(){
      const list = Array.from(glossToSign.keys()).sort();
      if (allowedOut) allowedOut.textContent = list.join(', ');
      rebuildBaseIndex();
    }

    async function loadAlphabetSigmlUrl(url, isAutoload = false){
      try{
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 15000);
        const res = await fetch(url, { signal: controller.signal });
        clearTimeout(timeout);
        if (!res.ok){ if (isAutoload && res.status === 404){ log(`Optional alphabet DB missing: ${url}`); return; } throw new Error('HTTP ' + res.status); }
        const xmlText = await res.text();
        const doc = new DOMParser().parseFromString(xmlText, 'application/xml');
        const signs = Array.from(doc.querySelectorAll('hns_sign'));
        let added = 0;
        for (const s of signs){ const gloss = (s.getAttribute('gloss')||'').trim().toUpperCase(); if (!gloss || gloss.length !== 1 || gloss < 'A' || gloss > 'Z') continue; letterToSign.set(gloss, s.outerHTML); added++; }
        log(`Loaded ${added} alphabet letters from ${url}`);
      }catch(e){ if (isAutoload){ log(`Optional alphabet DB missing: ${url}`); } else { log(`Failed to load alphabet ${url}: ${e}.`); } }
    }

    function parseTable(text){
      let cleaned = text;
      if (text.charCodeAt(0) === 0xFEFF) cleaned = text.slice(1);
      const delim = cleaned.includes('\t') ? '\t' : ',';
      const lines = cleaned.split(/\r?\n/).filter(line => line.trim());
      if (!lines.length) return { header: [], rows: [] };
      const header = (lines.shift()||'').split(delim).map(s=>s.trim().toLowerCase());
      const rows = lines.map(line => { const cols = line.split(delim).map(s=>s.trim()); const obj = {}; for (let i=0;i<header.length;i++) obj[header[i]] = cols[i]||''; return obj; });
      return { header, rows };
    }

    async function loadConceptCsvUrl(url, isAutoload = false){
      try{
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 15000);
        const res = await fetch(url, { signal: controller.signal });
        clearTimeout(timeout);
        if (!res.ok){ if (isAutoload && res.status === 404){ log(`Optional DB missing: ${url}`); return; } throw new Error('HTTP ' + res.status); }
        const txt = await res.text();
        const { header, rows } = parseTable(txt);
        if (!header.includes('concept') || !header.includes('gloss')) throw new Error('CSV must have "concept" and "gloss" headers');
        let n = 0;
        for (const r of rows){ const concept = String(r.concept||'').toLowerCase().trim(); const gloss = String(r.gloss||'').toLowerCase().trim(); if (!concept||!gloss) continue; conceptToGloss.set(glossBase(concept), gloss); n++; }
        log(`Loaded ${n} concepts from ${url}`);
      }catch(e){ if (isAutoload){ log(`Optional DB missing: ${url}`); } else { log('Concept CSV load error: ' + e); } }
    }

    async function loadConceptCsvFile(file){
      try{
        const txt = await file.text();
        const { header, rows } = parseTable(txt);
        if (!header.includes('concept') || !header.includes('gloss')) throw new Error('CSV must have "concept" and "gloss" headers');
        let n = 0;
        for (const r of rows){ const concept = String(r.concept||'').toLowerCase().trim(); const gloss = String(r.gloss||'').toLowerCase().trim(); if (!concept||!gloss) continue; conceptToGloss.set(glossBase(concept), gloss); n++; }
        log(`Loaded ${n} concept→gloss entries from file: ${file.name}`);
      }catch(e){ log('Concept CSV file error: ' + e); }
    }

    loadConceptBtn?.addEventListener('click', ()=>{ const u = conceptUrlInput?.value.trim(); if (u) loadConceptCsvUrl(u); });
    if (conceptFile) conceptFile.addEventListener('change', (e) => { const f = e.target?.files?.[0]; if (f) loadConceptCsvFile(f); });
    loadDbBtn?.addEventListener('click', () => { const u = dbUrlInput.value.trim(); if (u) loadSigmlUrl(u); });

  </script>

  <script>
    const SIGN_LANG_GLOSS = {
      bsl: 'en', asl: 'en', dgs: 'en', lsf: 'fr',
      lse: 'es', pjm: 'pl', gsl: 'en', rsl: 'ru',
      algerian: null, bangla: 'en', ngt: 'nl', fsl: null,
      isl: 'en', kurdish: 'ku', vsl: 'en'
    };

    const SIGN_LANG_DB = {
      bsl:      { sigml: ['/data/hamnosys_bsl_version1.sigml'], csv: '/data/hamnosys_bsl.csv', alphabet: '/data/bsl_alphabet_sigml.sigml' },
      asl:      { sigml: ['/data/hamnosys_bsl_version1.sigml'], csv: '/data/hamnosys_bsl.csv', alphabet: '/data/asl_alphabet_sigml.sigml' },
      dgs:      { sigml: ['/data/German_SL_DGS.sigml'], csv: '/data/hamnosys_dgs.csv', alphabet: '/data/dgs_alphabet_sigml.sigml' },
      lsf:      { sigml: ['/data/French_SL_LSF.sigml'], csv: '/data/hamnosys_lsf.csv', alphabet: '/data/lsf_alphabet_sigml.sigml' },
      lse:      { sigml: [], csv: null, alphabet: null },
      pjm:      { sigml: ['/data/Polish_SL_PJM.sigml'], csv: '/data/hamnosys_pjm.csv', alphabet: '/data/pjm_alphabet_sigml.sigml' },
      gsl:      { sigml: ['/data/Greek_SL_GSL.sigml'], csv: '/data/hamnosys_gsl.csv', alphabet: null },
      rsl:      { sigml: [], csv: null, alphabet: null },
      algerian: { sigml: ['/data/Algerian_SL.sigml'], csv: null, alphabet: null },
      bangla:   { sigml: ['/data/Bangla_SL.sigml'], csv: null, alphabet: null },
      ngt:      { sigml: ['/data/Dutch_SL_NGT.sigml'], csv: '/data/hamnosys_ngt.csv', alphabet: '/data/ngt_alphabet_sigml.sigml' },
      fsl:      { sigml: ['/data/Filipino_SL.sigml'], csv: null, alphabet: null },
      isl:      { sigml: ['/data/Indian_SL.sigml'], csv: null, alphabet: null },
      kurdish:  { sigml: ['/data/Kurdish_SL.sigml'], csv: null, alphabet: null },
      vsl:      { sigml: ['/data/Vietnamese_SL.sigml'], csv: null, alphabet: null },
    };

    function extractEmbeddedAlphabet() {
      for (const [gloss, sigml] of glossToSign.entries()) {
        const upper = gloss.toUpperCase();
        if (upper.length === 1 && upper >= 'A' && upper <= 'Z' && !letterToSign.has(upper)) {
          letterToSign.set(upper, sigml);
        }
      }
    }

    let _switchId = 0;
    const FALLBACK_ALPHABET = '/data/bsl_alphabet_sigml.sigml';

    async function switchSignLanguage(langCode) {
      const myId = ++_switchId;
      glossToSign.clear();
      letterToSign.clear();
      baseToGloss.clear();
      conceptToGloss.clear();
      refreshAllowedOutput();

      const db = SIGN_LANG_DB[langCode];
      if (!db) { log('No database for: ' + langCode); return; }

      for (const url of db.sigml) {
        if (_switchId !== myId) return;
        await loadSigmlUrl(url, true);
      }
      if (_switchId !== myId) return;
      if (db.csv) await loadConceptCsvUrl(db.csv, true);
      if (_switchId !== myId) return;
      if (db.alphabet) await loadAlphabetSigmlUrl(db.alphabet, true);

      if (_switchId !== myId) return;
      extractEmbeddedAlphabet();

      if (letterToSign.size < 26) {
        await loadAlphabetSigmlUrl(FALLBACK_ALPHABET, true);
      }

      if (_switchId !== myId) return;
      if (glossToSign.size === 0 && letterToSign.size === 0) {
        log('No sign database available — fingerspelling only');
        renderStatus.textContent = 'No sign database available — fingerspelling only';
        renderStatus.className = 'status-badge';
      } else if (glossToSign.size === 0) {
        log('No signs loaded — fingerspelling only (' + letterToSign.size + ' letters)');
        renderStatus.textContent = 'No sign database available — fingerspelling only';
        renderStatus.className = 'status-badge';
      } else {
        log('Loaded ' + langCode.toUpperCase() + ': ' + glossToSign.size + ' signs, ' + letterToSign.size + ' letters');
      }
    }

    const SIGN_LANG_NAMES = {
      bsl: 'BSL', asl: 'ASL', dgs: 'DGS', lsf: 'LSF', lse: 'LSE',
      pjm: 'PJM', gsl: 'GSL', rsl: 'RSL', algerian: 'Algerian SL',
      bangla: 'Bangla SL', ngt: 'NGT', fsl: 'FSL', isl: 'ISL',
      kurdish: 'Kurdish SL', vsl: 'VSL'
    };

    document.getElementById('signLangSelect').addEventListener('change', async function() {
      const lang = this.value;
      const name = SIGN_LANG_NAMES[lang] || lang.toUpperCase();
      renderStatus.textContent = 'Loading ' + name + ' database…';
      renderStatus.className = 'status-badge loading';
      await switchSignLanguage(lang);
      checkAllReady();
    });

    let _avatarReady = false;
    let _dbReady = false;
    function checkAllReady() {
      _dbReady = glossToSign.size > 0;
      if (_avatarReady && _dbReady) {
        renderStatus.textContent = 'Ready';
        renderStatus.className = 'status-badge ready';
      } else if (_dbReady) {
        renderStatus.textContent = 'Loading avatar…';
        renderStatus.className = 'status-badge loading';
      }
    }

    window.addEventListener('load', async () => {
      await switchSignLanguage('bsl');
      checkAllReady();
    });
  </script>

  <script>

    const translatorCache = {};

    let _pipeline = null;
    async function getPipeline() {
      if (_pipeline) return _pipeline;
      const mod = await import('https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2');
      _pipeline = mod.pipeline;
      return _pipeline;
    }

    async function loadTranslator(src, tgt) {
      const key = src + '-' + tgt;
      if (translatorCache[key]) return translatorCache[key];
      const pipeline = await getPipeline();
      const modelName = 'Xenova/opus-mt-' + src + '-' + tgt;
      log('Loading translation model: ' + modelName + '…');
      renderStatus.textContent = 'Downloading translation model… This may take a moment on first use.';
      renderStatus.className = 'status-badge loading';
      const translator = await Promise.race([
        pipeline('translation', modelName),
        new Promise((_, reject) => setTimeout(() => reject(new Error('Translation model loading timed out')), 60000))
      ]);
      translatorCache[key] = translator;
      return translator;
    }

    async function translateText(text, srcLang, tgtLang) {
      if (!text.trim() || srcLang === tgtLang) return text;
      try {
        const translator = await loadTranslator(srcLang, tgtLang);
        const result = await translator(text);
        return (result?.[0]?.translation_text || text).trim();
      } catch (directErr) {
        if (srcLang !== 'en' && tgtLang !== 'en') {
          log('Direct model unavailable, pivoting through English…');
          try {
            const toEn = await loadTranslator(srcLang, 'en');
            const enResult = await toEn(text);
            const enText = (enResult?.[0]?.translation_text || '').trim();
            if (!enText) throw new Error('Empty pivot result');
            const fromEn = await loadTranslator('en', tgtLang);
            const finalResult = await fromEn(enText);
            return (finalResult?.[0]?.translation_text || enText).trim();
          } catch (pivotErr) {
            log('Translation failed — continuing with original text');
            renderStatus.textContent = 'Translation unavailable — using original text';
            renderStatus.className = 'status-badge';
            return text;
          }
        }
        log('Translation failed — continuing with original text');
        renderStatus.textContent = 'Translation unavailable — using original text';
        renderStatus.className = 'status-badge';
        return text;
      }
    }

    function getInputLang() { return document.getElementById('langHint').value; }
    function getSignLang() { return document.getElementById('signLangSelect').value; }
    function getTargetLang() { return SIGN_LANG_GLOSS[getSignLang()] || 'en'; }

    async function translateIfNeeded(text, statusFn) {
      const src = getInputLang();
      const glossLang = SIGN_LANG_GLOSS[getSignLang()];
      const tgt = glossLang || 'en';
      if (src === tgt) return text;
      if (statusFn) statusFn('Translating ' + src.toUpperCase() + ' → ' + tgt.toUpperCase() + '…');
      const translated = await translateText(text, src, tgt);
      if (translated !== text) log('Translated: "' + text.substring(0, 40) + '…" → "' + translated.substring(0, 40) + '…"');
      return translated;
    }
  </script>

  <script>
    const textIn = document.getElementById('textIn');
    const planLog = document.getElementById('planLog');
    const normalizedOut = document.getElementById('normalizedOut');
    const tokensOut = document.getElementById('tokensOut');

    async function planWithSpaCyBackend(rawText) {
      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 10000);
        const resp = await fetch('/api/plan', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text: rawText, language: getTargetLang(), sign_language: getSignLang() }), signal: controller.signal });
        clearTimeout(timeout);
        if (!resp.ok) { const detail = await resp.text().catch(() => ''); throw new Error(`Backend HTTP ${resp.status} ${detail}`); }
        return await resp.json();
      } catch (e) { console.error("spaCy backend fetch failed:", e); throw e; }
    }

    const STOPWORDS = new Set(['a','an','the','and','or','but','if','then','than','of','to','in','on','at','for','from','with','as','by','is','are','am','be','been','was','were','do','does','did','that','this','those','these','it','my','your','our']);
    const TOPIC_TIME = new Set(['today','yesterday','tomorrow','morning','afternoon','evening','night','noon','week','month','year','time']);

    function normalizeText(str){
      try { return (str||'').toLowerCase().replace(/[\p{P}\p{S}]/gu,' ').split(/\s+/).filter(Boolean); }
      catch(e) { return (str||'').toLowerCase().replace(/[^\w\s]/g,' ').split(/\s+/).filter(Boolean); }
    }

    function heuristicPlan(tokens){ const kept = tokens.filter(t => !STOPWORDS.has(t)); const front = kept.filter(t => TOPIC_TIME.has(t)); const rest = kept.filter(t => !TOPIC_TIME.has(t)); return [...front, ...rest]; }

    function levenshtein(a,b){ const m=a.length, n=b.length; if(!m) return n; if(!n) return m; const dp = new Array(n+1); for(let j=0;j<=n;j++) dp[j]=j; for(let i=1;i<=m;i++){ let prev = dp[0]; dp[0]=i; for(let j=1;j<=n;j++){ const temp = dp[j]; dp[j] = Math.min(dp[j]+1, dp[j-1]+1, prev+(a[i-1]===b[j-1]?0:1)); prev = temp; } } return dp[n]; }
    function similarity(a,b){ if (!a||!b) return 0; const d = levenshtein(a,b); return 1 - d / Math.max(a.length, b.length); }

    function mapToAvailable(tokens, allowedGlosses, cutoff = 0.82){
      const mapped = [], subs = {}, missing = [], fingerspelled = [];
      if (!allowedGlosses.length) return { mapped, subs, missing: [...tokens], fingerspelled };
      const bases = allowedGlosses.map(g => glossBase(g));
      const baseToGlossLocal = new Map();
      for (let i=0; i<allowedGlosses.length; i++){ const g = allowedGlosses[i]; const b = bases[i]; if (!baseToGlossLocal.has(b)) baseToGlossLocal.set(b, g); }
      for (const t of tokens){
        if (allowedGlosses.includes(t)) { mapped.push(t); continue; }
        const tBase = glossBase(t);
        if (conceptToGloss.has(tBase)) { const g = conceptToGloss.get(tBase); if (glossToSign.has(g)) { mapped.push(g); if (t !== g) subs[t] = g; continue; } }
        if (baseToGloss.has(tBase)) { const g = baseToGloss.get(tBase); if (glossToSign.has(g)) { mapped.push(g); if (t !== g) subs[t] = g; continue; } }
        if (baseToGlossLocal.has(tBase)) { const g = baseToGlossLocal.get(tBase); mapped.push(g); if (t !== tBase) subs[t] = g; continue; }
        let bestBase = null, bestScore = 0;
        for (const b of baseToGlossLocal.keys()){ const s = similarity(tBase, b); if (s > bestScore) { bestScore = s; bestBase = b; } }
        if (bestBase && bestScore >= cutoff){ const g = baseToGlossLocal.get(bestBase); mapped.push(g); subs[t] = g; }
        else { if (letterToSign.size > 0 && /[A-Za-z]/.test(t)){ mapped.push(t); fingerspelled.push(t); } else { missing.push(t); } }
      }
      return { mapped, subs, missing, fingerspelled };
    }

    function currentAllowed(){ return Array.from(glossToSign.keys()).sort(); }

    async function doPlan(mode) {
      const raw0 = textIn.value.trim();
      if (!raw0) { log('Empty text.'); return; }
      const allowed = currentAllowed();
      if (allowed.length === 0) { log('No sign database loaded yet.'); return; }
      const { text: raw, count: abCount } = replaceAbbreviationsBrowser(raw0);
      if (abbrevCountOut) abbrevCountOut.value = String(abCount);
      if (timeframeOut) timeframeOut.value = timeframeGuess(raw);
      let mapped = null, subs = {}, missing = [];
      const rawTokens = raw.split(/\s+/).map(s => s.toLowerCase()).filter(Boolean);
      if (rawTokens.length && rawTokens.every(t => allowed.includes(t))) {
        if (normalizedOut) normalizedOut.value = rawTokens.join(' ');
        if (planLog) planLog.textContent = 'planned (exact gloss)';
        if (tokensOut) tokensOut.value = rawTokens.join(' ');
        window.__plannedTokens = rawTokens; return;
      }
      const phraseBase = glossBase(raw);
      if (conceptToGloss.has(phraseBase)) {
        const g = conceptToGloss.get(phraseBase);
        if (glossToSign.has(g)) {
          mapped = [g];
          if (normalizedOut) normalizedOut.value = raw;
          if (planLog) planLog.textContent = `concept-map: "${raw}" → "${g}"`;
          if (tokensOut) tokensOut.value = g;
          window.__plannedTokens = mapped; return;
        }
      }
      if (mode === 'spacy') {
        try {
          const backend = await planWithSpaCyBackend(raw);
          if (backend.error) { log('Backend unavailable — using local processing'); throw new Error(backend.error); }
          const backendTokens = String(backend.final||'').replace(/[.\n]/g,' ').split(/\s+/).filter(Boolean);
          const m = mapToAvailable(backendTokens, allowed, 0.82);
          const displayTokens = m.mapped.length ? m.mapped : backendTokens;
          if (normalizedOut) normalizedOut.value = backendTokens.join(' ');
          if (planLog){ const lines = ['spacy-backend']; if (Object.keys(m.subs).length) lines.push('subs: '+JSON.stringify(m.subs)); if (m.fingerspelled?.length) lines.push('fingerspelled: '+m.fingerspelled.join(', ')); if (m.missing.length) lines.push('missing: '+m.missing.join(', ')); planLog.textContent = lines.join('\n'); }
          if (tokensOut) tokensOut.value = displayTokens.join(' ');
          window.__plannedTokens = displayTokens; return;
        } catch (e) {
          log('Backend unavailable — using simplified processing');
          renderStatus.textContent = 'Backend unavailable — using simplified processing';
          renderStatus.className = 'status-badge';
        }
      }
      if (!mapped?.length && eduNlpToggle.checked) {
        const eduTokens = await processEducationalText(raw);
        const mEdu = mapToAvailable(eduTokens, allowed, 0.82);
        mapped = mEdu.mapped; subs = mEdu.subs; missing = mEdu.missing;
        if (normalizedOut) normalizedOut.value = eduTokens.join(' ');
        if (planLog){ const lines = ['edu-nlp']; if (Object.keys(subs).length) lines.push('subs: '+JSON.stringify(subs)); if (mEdu.fingerspelled?.length) lines.push('fingerspelled: '+mEdu.fingerspelled.join(', ')); if (missing.length) lines.push('missing: '+missing.join(', ')); planLog.textContent = lines.join('\n'); }
      }
      if (!mapped?.length) {
        const norm = normalizeText(raw);
        const heur = heuristicPlan(norm);
        const mHeur = mapToAvailable(heur, allowed, 0.82);
        mapped = mHeur.mapped; subs = mHeur.subs; missing = mHeur.missing;
        if (normalizedOut) normalizedOut.value = norm.join(' ');
        if (planLog){ const lines = []; if (heur.length) lines.push('heuristic: '+heur.join(' ')); if (Object.keys(subs).length) lines.push('subs: '+JSON.stringify(subs)); if (mHeur.fingerspelled?.length) lines.push('fingerspelled: '+mHeur.fingerspelled.join(', ')); if (missing.length) lines.push('missing: '+missing.join(', ')); planLog.textContent = lines.length ? lines.join('\n') : 'planned'; }
      }
      if (!mapped?.length) { log('No matching signs — fingerspelling entire phrase'); return; }
      if (tokensOut) tokensOut.value = mapped.join(' ');
      window.__plannedTokens = mapped;
    }
  </script>

  <script>
    const stopBtn = document.getElementById('stopBtn');

    function fingerspellWord(word){ const blocks = []; const upperWord = (word||'').toUpperCase(); for (const char of upperWord){ if (char >= 'A' && char <= 'Z'){ const lb = letterToSign.get(char); if (lb) blocks.push(lb); } } return blocks; }

    function buildSigml(tokens){
      const blocks = [];
      for (const t of tokens){
        const b = glossToSign.get(t);
        if (b) { blocks.push(b); }
        else if (letterToSign.size > 0) { const base = glossBase(t); const lb = fingerspellWord(base || t); if (lb.length > 0){ blocks.push(...lb); log(`Fingerspelling: "${base || t}"`); } }
      }
      if (!blocks.length) return null;
      return `<?xml version="1.0" encoding="utf-8"?>\n<sigml>\n${blocks.join('\n')}\n</sigml>`;
    }

    function playSigml(sigml){ try{ CWASA.playSiGMLText(sigml, 0); }catch(e){ log('CWASA play error: ' + e); } }

    const translateBtn = document.getElementById('translateBtn');
    const tokenList = document.getElementById('tokenList');
    const playbackProgress = document.getElementById('playbackProgress');
    const playbackProgressBar = document.getElementById('playbackProgressBar');

    function showTokenChips(tokens) {
      tokenList.innerHTML = '';
      tokens.forEach(t => {
        const chip = document.createElement('span');
        chip.className = 'token-chip';
        chip.textContent = t;
        chip.dataset.token = t;
        tokenList.appendChild(chip);
      });
    }

    function highlightToken(index, total) {
      const chips = tokenList.querySelectorAll('.token-chip');
      chips.forEach((chip, i) => {
        if (i < index) chip.className = 'token-chip done';
        else if (i === index) chip.className = 'token-chip active';
        else chip.className = 'token-chip';
      });
      if (playbackProgress) {
        playbackProgress.style.display = 'block';
        playbackProgressBar.style.width = ((index + 1) / total * 100) + '%';
      }
    }

    function clearPlaybackUI() {
      if (playbackProgress) playbackProgress.style.display = 'none';
      if (playbackProgressBar) playbackProgressBar.style.width = '0%';
    }

    let _playbackTimer = null;
    function simulatePlayback(tokens) {
      if (_playbackTimer) clearInterval(_playbackTimer);
      const total = tokens.length;
      let current = 0;
      highlightToken(0, total);
      _playbackTimer = setInterval(() => {
        current++;
        if (current >= total) {
          clearInterval(_playbackTimer);
          _playbackTimer = null;
          const chips = tokenList.querySelectorAll('.token-chip');
          chips.forEach(c => c.className = 'token-chip done');
          if (playbackProgressBar) playbackProgressBar.style.width = '100%';
          renderStatus.textContent = 'Ready';
          renderStatus.className = 'status-badge ready';
          return;
        }
        highlightToken(current, total);
      }, 1200);
    }

    translateBtn?.addEventListener('click', async () => {
      const cwasaAvailable = !!window.CWASA;
      translateBtn.disabled = true;
      clearPlaybackUI();
      tokenList.innerHTML = '';
      try {
        renderStatus.textContent = 'Translating…';
        renderStatus.className = 'status-badge loading';
        const originalText = textIn.value.trim();
        const translated = await translateIfNeeded(originalText, (msg) => { renderStatus.textContent = msg; });
        const translationExpected = getInputLang() !== getTargetLang();
        if (translationExpected && translated === originalText) {
          log('Translation failed — using original text');
          renderStatus.textContent = 'Translation unavailable — using original text';
          renderStatus.className = 'status-badge';
        }
        textIn.value = translated;
        await doPlan('spacy');
        const toks = window.__plannedTokens || [];
        if (!toks.length) { renderStatus.textContent = 'No matching signs found.'; renderStatus.className = 'status-badge'; return; }
        const sigml = buildSigml(toks);
        showTokenChips(toks);
        if (!cwasaAvailable) {
          renderStatus.textContent = 'Avatar unavailable — showing text output';
          renderStatus.className = 'status-badge';
          return;
        }
        if (!sigml) {
          const allFingerspelled = toks.every(t => !glossToSign.has(t));
          if (allFingerspelled && letterToSign.size > 0) {
            renderStatus.textContent = 'No matching signs — fingerspelling entire phrase';
            renderStatus.className = 'status-badge loading';
          } else {
            renderStatus.textContent = 'No matching signs found.';
            renderStatus.className = 'status-badge';
            return;
          }
        }
        renderStatus.textContent = 'Playing…';
        renderStatus.className = 'status-badge loading';
        playSigml(sigml);
        simulatePlayback(toks);
      } catch (e) {
        console.error(e);
        renderStatus.textContent = 'Could not translate — showing original text';
        renderStatus.className = 'status-badge';
      }
      finally { translateBtn.disabled = false; }
    });

    stopBtn.addEventListener('click', () => {
      try { CWASA.stop(0); } catch(_e) {}
      if (_playbackTimer) { clearInterval(_playbackTimer); _playbackTimer = null; }
      clearPlaybackUI();
      renderStatus.textContent = 'Stopped';
      renderStatus.className = 'status-badge';
    });
  </script>

  <script>
    const recordBtn = document.getElementById('recordBtn');
    const transcribeBtn = document.getElementById('transcribeBtn');
    const micStatus = document.getElementById('micStatus');
    const transcription = document.getElementById('transcription');

    let mediaRecorder = null;
    let recordedChunks = [];

    function pickAsrModel(){
      const ua = navigator.userAgent||'';
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(ua);
      const lang = getInputLang();
      if (lang === 'en') return isMobile ? 'Xenova/whisper-tiny.en' : 'Xenova/whisper-small.en';
      return isMobile ? 'Xenova/whisper-tiny' : 'Xenova/whisper-small';
    }

    async function ensureASR(){
      const pipeline = await getPipeline();
      const model = pickAsrModel();
      if (!window.__asr || window.__asrModelName !== model){ window.__asr = await pipeline('automatic-speech-recognition', model); window.__asrModelName = model; }
      return window.__asr;
    }

    function getAsrOptions(){
      const opts = { chunk_length_s: 30, stride_length_s: 5 };
      const lang = getInputLang();
      if (lang && lang !== 'en') { opts.language = lang; opts.task = 'transcribe'; }
      return opts;
    }

    recordBtn.addEventListener('click', async () => {
      if (!mediaRecorder){
        try{
          const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
          recordedChunks = [];
          mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
          mediaRecorder.ondataavailable = (e)=>{ if(e.data.size>0) recordedChunks.push(e.data); };
          mediaRecorder.onstop = ()=>{ stream.getTracks().forEach(t=>t.stop()); };
          mediaRecorder.start();
          recordBtn.textContent = '■ Stop recording';
          recordBtn.classList.remove('btn-secondary'); recordBtn.classList.add('btn-primary');
          micStatus.textContent = 'Recording…'; micStatus.className = 'status-badge loading';
        }catch(e){ micStatus.textContent = 'Could not access microphone'; }
      } else {
        mediaRecorder.stop(); mediaRecorder = null;
        recordBtn.textContent = '● Start recording';
        recordBtn.classList.remove('btn-primary'); recordBtn.classList.add('btn-secondary');
        micStatus.textContent = `Recorded ${(recordedChunks.reduce((s,b)=>s+b.size,0)/1024/1024).toFixed(1)} MB`; micStatus.className = 'status-badge';
      }
    });

    transcribeBtn.addEventListener('click', async () => {
      if (!recordedChunks.length){ micStatus.textContent = 'Nothing recorded.'; return; }
      micStatus.textContent = 'Preparing speech recognition…'; micStatus.className = 'status-badge loading';
      try{
        const asr = await ensureASR();
        micStatus.textContent = 'Transcribing…';
        const blob = new Blob(recordedChunks, { type: 'audio/webm' });
        const result = await asr(blob, getAsrOptions());
        const rawText = (result?.text||'').trim();
        transcription.value = rawText;
        const translated = await translateIfNeeded(rawText, (msg) => { micStatus.textContent = msg; micStatus.className = 'status-badge loading'; });
        const micTranslationExpected = getInputLang() !== getTargetLang();
        if (micTranslationExpected && translated === rawText) {
          micStatus.textContent = 'Translation failed — try again or enter text in ' + getTargetLang().toUpperCase();
          micStatus.className = 'status-badge';
        }
        textIn.value = translated;
        if (!micTranslationExpected || translated !== rawText) { micStatus.textContent = 'Done ✓'; micStatus.className = 'status-badge ready'; }
      }catch(e){ micStatus.textContent = 'Could not transcribe audio'; micStatus.className = 'status-badge'; }
    });
  </script>

  <script>
    const videoFile = document.getElementById('videoFile');
    const videoToSignBtn = document.getElementById('videoToSignBtn');
    const videoStatus = document.getElementById('videoStatus');

    async function ensureFFmpeg(){
      if (!window.__ffmpeg){
        if (typeof FFmpeg === 'undefined') {
          await new Promise(function(resolve, reject) {
            var s = document.createElement('script');
            s.src = 'https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/ffmpeg.min.js';
            s.onload = resolve;
            s.onerror = reject;
            document.head.appendChild(s);
          });
        }
        const { createFFmpeg, fetchFile } = FFmpeg; const ffmpeg = createFFmpeg({ log: false }); await ffmpeg.load(); window.__ffmpeg = { ffmpeg, fetchFile };
      }
      return window.__ffmpeg;
    }

    videoToSignBtn.addEventListener('click', async () => {
      const file = videoFile?.files?.[0];
      if (!file){ videoStatus.textContent = 'Choose a video first.'; return; }
      try{
        videoStatus.textContent = 'Preparing…'; videoStatus.className = 'status-badge loading';
        const { ffmpeg, fetchFile } = await ensureFFmpeg();
        videoStatus.textContent = 'Extracting audio…';
        ffmpeg.FS('writeFile', 'in', await fetchFile(file));
        await ffmpeg.run('-i', 'in', '-vn', '-ac', '1', '-ar', '16000', '-f', 'wav', 'out.wav');
        const data = ffmpeg.FS('readFile', 'out.wav');
        const wavBlob = new Blob([data.buffer], { type: 'audio/wav' });
        videoStatus.textContent = 'Preparing speech recognition…';
        const asr = await ensureASR();
        videoStatus.textContent = 'Transcribing…';
        const result = await asr(wavBlob, getAsrOptions());
        const rawText = (result?.text||'').trim();
        transcription.value = rawText;
        const translated = await translateIfNeeded(rawText, (msg) => { videoStatus.textContent = msg; });
        const vidTranslationExpected = getInputLang() !== getTargetLang();
        if (vidTranslationExpected && translated === rawText) {
          videoStatus.textContent = 'Translation failed — try again or enter text in ' + getTargetLang().toUpperCase();
          videoStatus.className = 'status-badge';
          return;
        }
        videoStatus.textContent = 'Planning…';
        textIn.value = translated;
        await doPlan('spacy');
        videoStatus.textContent = 'Ready to render ✓'; videoStatus.className = 'status-badge ready';
      }catch(e){ videoStatus.textContent = 'Could not process video'; videoStatus.className = 'status-badge'; }
    });
  </script>

  <script>
    function log(msg){
      const el = document.getElementById('planLog');
      const now = new Date().toLocaleTimeString();
      if (!el) return;
      const prev = el.textContent ? (el.textContent + '\n') : '';
      el.textContent = prev + `[${now}] ${msg}`;
    }
  </script>

  <script>
    window.addEventListener('error', e => { log('JS error: ' + (e?.error?.message || e.message)); });
    window.addEventListener('unhandledrejection', e => { log('Promise rejection: ' + (e?.reason?.message || e.reason)); });
  </script>

  <script>
    const charCount = document.getElementById('charCount');
    textIn.addEventListener('input', () => {
      const len = textIn.value.length;
      charCount.textContent = len + ' / 500';
      charCount.className = len > 500 ? 'char-count over' : 'char-count';
    });

    document.getElementById('hamburgerBtn').addEventListener('click', () => {
      document.querySelector('.sidebar').classList.toggle('open');
    });

    window.addEventListener('load', () => { textIn.focus(); });
  </script>
